<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads 投稿ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --border: #ede8e0;
    --text: #1a1714;
    --muted: #9e9080;
    --accent1: #e8845a;
    --accent2: #c95f8a;
    --accent-grad: linear-gradient(135deg, #e8845a, #c95f8a);
    --shop1: #e8845a;
    --shop2: #8a5fc9;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-size: 1.1rem;
    font-weight: 900;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* Shop tabs */
  .shop-tabs {
    display: flex;
    gap: 0;
    padding: 20px 20px 0;
  }

  .shop-tab {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.2s;
    text-align: center;
    line-height: 1.4;
  }

  .shop-tab:first-child { border-radius: 12px 0 0 12px; }
  .shop-tab:last-child  { border-radius: 0 12px 12px 0; border-left: none; }

  .shop-tab.active-1 {
    background: #fff5f0;
    border-color: var(--shop1);
    color: var(--shop1);
  }

  .shop-tab.active-2 {
    background: #f5f0ff;
    border-color: var(--shop2);
    color: var(--shop2);
  }

  .shop-tab .tab-num {
    display: block;
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    margin-bottom: 2px;
    opacity: 0.7;
  }

  /* Shop info card */
  .shop-info {
    margin: 16px 20px;
    background: var(--surface);
    border-radius: 14px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .shop-badge {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .shop-badge-1 { background: #fff0ea; }
  .shop-badge-2 { background: #f0eaff; }

  .shop-name {
    font-size: 0.85rem;
    font-weight: 900;
    margin-bottom: 3px;
  }

  .shop-desc {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Generate button */
  .gen-wrap {
    padding: 0 20px 16px;
  }

  .gen-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 14px;
    background: var(--accent-grad);
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }

  .gen-btn:active { transform: scale(0.98); opacity: 0.9; }

  .gen-btn.shop1 { background: linear-gradient(135deg, #e8845a, #e85a8a); }
  .gen-btn.shop2 { background: linear-gradient(135deg, #8a5fc9, #c95f8a); }

  .gen-btn.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  /* Day cards */
  .days-wrap {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .day-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: slideIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #fdfcfa;
  }

  .day-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .day-num {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .day-angle {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .angle-失敗談 { background: #fff0ea; color: #e8845a; }
  .angle-気づき { background: #eafff5; color: #2a9d6a; }
  .angle-ノウハウ { background: #eaf4ff; color: #3a7ec9; }
  .angle-共感 { background: #ffeaf5; color: #c93a7e; }

  .day-time {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .day-body {
    padding: 14px 16px;
    font-size: 0.88rem;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 80px;
  }

  .day-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .copy-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .copy-btn:active { transform: scale(0.96); }
  .copy-btn.copied { background: #eafff5; color: #2a9d6a; border-color: #2a9d6a; }

  /* Loading spinner */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.8;
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }

  /* API key input */
  .apikey-wrap {
    margin: 0 20px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .apikey-label {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
    display: block;
  }

  .apikey-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }

  .apikey-input:focus { border-color: var(--accent1); }

  /* Dropdown */
  .shop-tab-wrap {
    flex: 1;
    position: relative;
  }

  .shop-tab-wrap .shop-tab {
    width: 100%;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .shop-tab-wrap:first-child .shop-tab { border-radius: 12px 0 0 12px; }
  .shop-tab-wrap:last-child .shop-tab  { border-radius: 0 12px 12px 0; border-left: none; }

  .tab-arrow {
    font-size: 0.8rem;
    margin-top: 2px;
    transition: transform 0.2s;
    opacity: 0.7;
  }

  .tab-arrow.open { transform: rotate(180deg); }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 200;
    overflow: hidden;
  }

  .dropdown.open { display: block; }

  .dropdown-item {
    padding: 12px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    font-weight: 700;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--bg); }
  .dropdown-item.active-item { color: var(--accent1); background: #fff8f5; }
  .dropdown-item.add-item { color: var(--muted); font-weight: 400; }

</style>
</head>

// ドロップダウン開閉
function toggleDropdown(tabNum) {
  const dd = document.getElementById('dropdown' + tabNum);
  const arrow = document.getElementById('arrow' + tabNum);
  const otherDd = document.getElementById('dropdown' + (tabNum === 1 ? 2 : 1));
  const otherArrow = document.getElementById('arrow' + (tabNum === 1 ? 2 : 1));

  const isOpen = dd.classList.contains('open');

  // 他を閉じる
  otherDd.classList.remove('open');
  otherArrow.classList.remove('open');

  if (isOpen) {
    dd.classList.remove('open');
    arrow.classList.remove('open');
    // ドロップダウンを閉じたときはそのタブの専門店をアクティブにする
    const shopId = tabNum === 1 ? currentTab1Shop : currentTab2Shop;
    activateShop(tabNum, shopId);
  } else {
    dd.classList.add('open');
    arrow.classList.add('open');
  }
}

// ドロップダウンから専門店を選択
function selectShop(tabNum, shopId) {
  if (tabNum === 1) currentTab1Shop = shopId;
  else currentTab2Shop = shopId;

  // ドロップダウン内のactive更新
  const dd = document.getElementById('dropdown' + tabNum);
  dd.querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('active-item'));
  event.target.classList.add('active-item');

  // タブラベル更新
  const s = SHOPS[shopId];
  const labelParts = s.name.split(' × ');
  document.getElementById('tab' + tabNum + '-label').innerHTML = labelParts[0] + '<br>' + (labelParts[1] || '');

  // ドロップダウンを閉じる
  dd.classList.remove('open');
  document.getElementById('arrow' + tabNum).classList.remove('open');

  activateShop(tabNum, shopId);
}

function activateShop(tabNum, shopId) {
  currentShop = shopId;
  const s = SHOPS[shopId];

  document.getElementById('tab1').className = 'shop-tab' + (tabNum === 1 ? ' active-1' : '');
  document.getElementById('tab2').className = 'shop-tab' + (tabNum === 2 ? ' active-2' : '');

  document.getElementById('genBtn').className = 'gen-btn ' + s.color;
  renderShopInfo();
  document.getElementById('daysWrap').innerHTML = `
    <div class="empty">
      <span class="empty-icon">✍️</span>
      上のボタンを押すと<br>7日分の投稿文が自動生成されます
    </div>`;
}

// 外クリックでドロップダウンを閉じる
document.addEventListener('click', (e) => {
  if (!e.target.closest('.shop-tab-wrap')) {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.tab-arrow').forEach(a => a.classList.remove('open'));
  }
});

function switchShop(n) {
  activateShop(n <= 2 ? n : 1, n);
}

function renderShopInfo() {
  const s = SHOPS[currentShop];
  const bgColor = s.accent + '18';
  document.getElementById('shopInfo').innerHTML = `
    <div class="shop-badge" style="background:${bgColor}">${s.icon}</div>
    <div>
      <div class="shop-name" style="color:${s.accent}">${s.name}</div>
      <div class="shop-desc">ターゲット：${s.target}<br>テーマ：${s.theme}</div>
    </div>`;
}

// ランダム投稿時間（20:00〜23:00、分単位で揺らぎ）
function randomTime() {
  const hour = 20 + Math.floor(Math.random() * 3);
  const minuteOptions = [3, 7, 11, 17, 23, 29, 33, 37, 41, 47, 51, 53, 57];
  const min = minuteOptions[Math.floor(Math.random() * minuteOptions.length)];
  return `${hour}:${String(min).padStart(2, '0')}`;
}

// プロンプト生成
function buildPrompt(shop, angle, dayIndex) {
  const s = SHOPS[shop];
  const prompts = {
    '失敗談': `あなたは${s.target}向けのThreadsアカウントの中の人です。
以下の条件で、失敗談（Empathy/Comments角度）の投稿文を日本語で書いてください。

【条件】
- ターゲット：${s.target}
- テーマ：${s.theme}
- キーワード：${s.keywords.join('、')}
- 文字数：300〜500文字（必ず300文字以上書くこと。改行を効果的に使い読みやすくすること）
- 冒頭3行で共感を取る（具体的な場面描写）
- 自分の失敗談として書く
- 最後は「明日〇〇をシェアします」で終わる寸止め効果
- 改行を効果的に使う
- ハッシュタグなし
- 投稿文のみ出力（説明文不要）`,

    '気づき': `あなたは${s.target}向けのThreadsアカウントの中の人です。
以下の条件で、気づき系（Perspective Shift角度）の投稿文を日本語で書いてください。

【条件】
- ターゲット：${s.target}
- テーマ：${s.theme}
- キーワード：${s.keywords.join('、')}
- 文字数：300〜500文字（必ず300文字以上書くこと。改行を効果的に使い読みやすくすること）
- 「実は〇〇だと思っていたけど、本当は△△だった」という構造
- 読者の常識をひっくり返す気づきを提供
- 最後は続きへの期待で終わる
- 改行を効果的に使う
- ハッシュタグなし
- 投稿文のみ出力（説明文不要）`,

    'ノウハウ': `あなたは${s.target}向けのThreadsアカウントの中の人です。
以下の条件で、ノウハウ系（Saves角度）の投稿文を日本語で書いてください。

【条件】
- ターゲット：${s.target}
- テーマ：${s.theme}
- キーワード：${s.keywords.join('、')}
- 文字数：300〜500文字（必ず300文字以上書くこと。改行を効果的に使い読みやすくすること）
- 具体的なTipsを2〜3個箇条書きで紹介
- 「保存しておきたい」と思わせる実用的な内容
- 楽天で買える${s.products[Math.floor(Math.random() * s.products.length)]}に自然につながる内容
- ハッシュタグなし
- 投稿文のみ出力（説明文不要）`,

    '共感': `あなたは${s.target}向けのThreadsアカウントの中の人です。
以下の条件で、共感ストーリー（Emotion角度）の投稿文を日本語で書いてください。

【条件】
- ターゲット：${s.target}
- テーマ：${s.theme}
- キーワード：${s.keywords.join('、')}
- 文字数：300〜500文字（必ず300文字以上書くこと。改行を効果的に使い読みやすくすること）
- 「わかる！」と思わせる感情的な共感から始まる
- 読者の気持ちを代弁する
- 希望や前向きなメッセージで終わる
- 改行を効果的に使う
- ハッシュタグなし
- 投稿文のみ出力（説明文不要）`
  };

  return prompts[angle];
}

async function generatePost(shop, angle, dayIndex) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('APIキーを入力してください');
  const response = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: buildPrompt(shop, angle, dayIndex)
      }]
    })
  });
  const data = await response.json();
  return data.choices?.[0]?.message?.content || 'エラーが発生しました';
}

async function generate() {
  const btn = document.getElementById('genBtn');
  const wrap = document.getElementById('daysWrap');

  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner"></div> 生成中...';
  wrap.innerHTML = '';

  const times = [];
  while (times.length < 7) {
    const t = randomTime();
    if (!times.includes(t)) times.push(t);
  }
  times.sort();

  for (let i = 0; i < 7; i++) {
    const angle = ANGLES[i];
    const time = times[i];
    const day = DAYS_JP[i];

    // カードを先に表示（ローディング状態）
    const card = document.createElement('div');
    card.className = 'day-card';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="day-header">
        <div class="day-label">
          <span class="day-num">DAY ${i+1} · ${day}</span>
          <span class="day-angle angle-${angle}">${angle}</span>
        </div>
        <span class="day-time">📅 ${time}</span>
      </div>
      <div class="day-body" id="body-${i}">生成中...</div>
      <div class="day-footer">
        <button class="copy-btn" id="copy-${i}" onclick="copyPost(${i})" disabled>コピー</button>
      </div>`;
    wrap.appendChild(card);

    // 非同期で投稿文を生成
    generatePost(currentShop, angle, i).then(text => {
      document.getElementById(`body-${i}`).textContent = text;
      const copyBtn = document.getElementById(`copy-${i}`);
      copyBtn.disabled = false;
      copyBtn.dataset.text = text;
    }).catch(() => {
      document.getElementById(`body-${i}`).textContent = 'エラーが発生しました。もう一度お試しください。';
    });
  }

  btn.classList.remove('loading');
  btn.innerHTML = '✨ 1週間分の投稿文を生成する';
}

function copyPost(i) {
  const btn = document.getElementById(`copy-${i}`);
  const text = btn.dataset.text || document.getElementById(`body-${i}`).textContent;
  if (!text || text === '生成中...') return;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'コピー済み ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'コピー';
        btn.classList.remove('copied');
      }, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'コピー済み ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  }
}

// 初期表示
renderShopInfo();
</script>
