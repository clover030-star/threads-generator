<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads 投稿ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5; --surface: #ffffff; --border: #ede8e0;
    --text: #1a1714; --muted: #9e9080;
    --accent1: #e8845a; --accent2: #c95f8a;
    --accent-grad: linear-gradient(135deg, #e8845a, #c95f8a);
    --shop1: #e8845a; --shop2: #8a5fc9;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: "Zen Kaku Gothic New", sans-serif; min-height: 100vh; padding: 0 0 80px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 1.1rem; font-weight: 900; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-sub { font-size: 0.7rem; color: var(--muted); font-family: "DM Mono", monospace; }
  .header-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.72rem; font-weight: 700; cursor: pointer; color: var(--muted); }

  /* キャラクター選択 */
  .char-wrap { margin: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow); }
  .char-label { font-size: 0.68rem; font-family: "DM Mono", monospace; color: var(--muted); margin-bottom: 8px; display: block; }
  .char-select { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 10px; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.88rem; font-weight: 700; color: var(--text); background: var(--bg); outline: none; cursor: pointer; }
  .char-select:focus { border-color: var(--accent1); }
  .char-desc { margin-top: 8px; font-size: 0.78rem; color: var(--muted); line-height: 1.6; min-height: 20px; }

  /* SHOP tabs */
  .shop-tabs { display: flex; padding: 16px 20px 0; }
  .shop-tab-wrap { flex: 1; position: relative; }
  .shop-tab { width: 100%; padding: 14px 16px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--muted); text-align: center; line-height: 1.4; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .shop-tab-wrap:first-child .shop-tab { border-radius: 12px 0 0 12px; }
  .shop-tab-wrap:last-child .shop-tab { border-radius: 0 12px 12px 0; border-left: none; }
  .shop-tab.active-1 { background: #fff5f0; border-color: var(--shop1); color: var(--shop1); }
  .shop-tab.active-2 { background: #f5f0ff; border-color: var(--shop2); color: var(--shop2); }
  .tab-num { font-size: 0.6rem; font-family: "DM Mono", monospace; opacity: 0.7; }
  .tab-arrow { font-size: 0.8rem; transition: transform 0.2s; opacity: 0.7; }
  .tab-arrow.open { transform: rotate(180deg); }
  .dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 200; overflow: hidden; }
  .dropdown.open { display: block; }
  .dropdown-item { padding: 12px 16px; font-size: 0.82rem; cursor: pointer; border-bottom: 1px solid var(--border); font-weight: 700; }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--bg); }
  .dropdown-item.active-item { color: var(--accent1); background: #fff8f5; }

  /* Shop info */
  .shop-info { margin: 12px 20px; background: var(--surface); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; }
  .shop-badge { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .shop-name { font-size: 0.85rem; font-weight: 900; margin-bottom: 2px; }
  .shop-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.5; }

  /* Mode buttons */
  .mode-wrap { margin: 0 20px 12px; }
  .mode-label { font-size: 0.68rem; font-family: "DM Mono", monospace; color: var(--muted); margin-bottom: 6px; display: block; }
  .mode-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .mode-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.72rem; font-weight: 700; cursor: pointer; color: var(--muted); }
  .mode-btn.active { background: var(--accent-grad); color: white; border-color: transparent; }
  .mode-info { font-size: 0.75rem; color: var(--muted); margin-top: 8px; padding: 8px 12px; background: #fdfcfa; border: 1px solid var(--border); border-radius: 10px; display: none; }
  .mode-info.show { display: block; }

  /* API key */
  .api-wrap { margin: 0 20px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .api-label { font-size: 0.7rem; color: var(--muted); font-family: "DM Mono", monospace; margin-bottom: 6px; display: block; }
  .api-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: "DM Mono", monospace; font-size: 0.78rem; color: var(--text); background: var(--bg); outline: none; }
  .api-input:focus { border-color: var(--accent1); }

  /* Generate button */
  .gen-wrap { padding: 0 20px 14px; }
  .gen-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--accent-grad); color: white; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .gen-btn.shop2 { background: linear-gradient(135deg, #8a5fc9, #c95f8a); }
  .gen-btn.loading { opacity: 0.7; pointer-events: none; }

  /* Posts */
  .days-wrap { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
  .day-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  .day-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: #fdfcfa; }
  .day-label { font-size: 0.65rem; font-family: "DM Mono", monospace; color: var(--muted); }
  .day-step { font-size: 0.72rem; font-weight: 700; padding: 2px 10px; border-radius: 20px; background: #f0eaff; color: #8a5fc9; }
  .day-body { padding: 14px; font-size: 0.88rem; line-height: 1.85; white-space: pre-wrap; word-break: break-word; min-height: 80px; }
  .day-footer { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  .copy-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: white; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; color: var(--muted); }
  .copy-btn.copied { background: #eafff5; color: #2a9d6a; border-color: #2a9d6a; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.85rem; line-height: 1.8; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-banner { margin: 12px 20px 0; padding: 8px 14px; border-radius: 10px; font-size: 0.76rem; font-weight: 700; display: none; }

  /* Products screen */
  .screen { display: none; }
  .screen.active { display: block; }
  .prod-wrap { max-width: 640px; margin: 0 auto; padding: 24px 20px; }
  .prod-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .prod-title { font-size: 1.1rem; font-weight: 900; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .prod-back { font-size: 0.8rem; color: var(--muted); cursor: pointer; text-decoration: underline; }
  .prod-shop-select select { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.85rem; background: var(--surface); color: var(--text); outline: none; margin-bottom: 16px; }
  .prod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .prod-card-name { font-size: 0.9rem; font-weight: 900; margin-bottom: 6px; }
  .prod-card-detail { font-size: 0.75rem; color: var(--muted); line-height: 1.7; }
  .prod-card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .prod-edit-btn, .prod-del-btn { padding: 4px 12px; border-radius: 8px; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.72rem; font-weight: 700; cursor: pointer; border: 1px solid var(--border); }
  .prod-del-btn { background: #fff0f0; color: #c94040; border-color: #ffc0c0; }
  .prod-add-btn { width: 100%; padding: 12px; border: 2px dashed var(--border); border-radius: 12px; background: var(--bg); color: var(--muted); font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
  .prod-reset-btn { width: 100%; padding: 10px; border: 1px solid #ffc0c0; border-radius: 10px; background: #fff0f0; color: #c94040; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .prod-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .prod-modal-overlay.open { display: flex; }
  .prod-modal { background: var(--surface); border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  .prod-modal-title { font-size: 1rem; font-weight: 900; margin-bottom: 16px; }
  .prod-field { margin-bottom: 12px; }
  .prod-field label { display: block; font-size: 0.72rem; color: var(--muted); font-family: "DM Mono", monospace; margin-bottom: 5px; }
  .prod-field input, .prod-field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.85rem; background: var(--bg); outline: none; }
  .prod-field textarea { min-height: 60px; resize: vertical; }
  .prod-modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .prod-save-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--accent-grad); color: white; font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.9rem; font-weight: 900; cursor: pointer; }
  .prod-cancel-btn { padding: 12px 18px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--muted); font-family: "Zen Kaku Gothic New", sans-serif; font-size: 0.9rem; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">Threads ジェネレーター</div>
    <div class="header-sub">あなたの人格で投稿文を自動生成  v3.1</div>
  </div>
  <button class="header-btn" onclick="showScreen('products')">📦 商品管理</button>
</div>

<!-- 生成画面 -->
<div class="screen active" id="screen-gen">

  <!-- ステータスバナー -->
  <div class="status-banner" id="statusBanner"></div>

  <!-- SHOPタブ -->
  <div class="shop-tabs">
    <div class="shop-tab-wrap">
      <button class="shop-tab active-1" id="tab1" onclick="toggleDropdown(1)">
        <span class="tab-num">SHOP 01</span>
        <span id="tab1-label">30代ママ<br>時短・QOL</span>
        <span class="tab-arrow" id="arrow1">▾</span>
      </button>
      <div class="dropdown" id="dropdown1">
        <div class="dropdown-item active-item" onclick="selectShop(1,1)">👶 時短・QOL爆上げ</div>
        <div class="dropdown-item" onclick="selectShop(1,3)">💪 産後ダイエット・美容</div>
        <div class="dropdown-item" onclick="selectShop(1,4)">💰 節約・知育・教育費</div>
        <div class="dropdown-item" onclick="selectShop(1,5)">🧘 メンタル・ストレスケア</div>
        <div class="dropdown-item" onclick="selectShop(1,6)">🍱 離乳食・子どもの食事</div>
        <div class="dropdown-item" onclick="selectShop(1,7)">💼 キャリア・副業</div>
        <div class="dropdown-item" onclick="selectShop(1,8)">💑 夫婦関係・パートナー</div>
      </div>
    </div>
    <div class="shop-tab-wrap">
      <button class="shop-tab" id="tab2" onclick="toggleDropdown(2)">
        <span class="tab-num">SHOP 02</span>
        <span id="tab2-label">40代ママ<br>美容・体の変化</span>
        <span class="tab-arrow" id="arrow2">▾</span>
      </button>
      <div class="dropdown" id="dropdown2">
        <div class="dropdown-item active-item" onclick="selectShop(2,2)">🌸 更年期・美容・体の変化</div>
        <div class="dropdown-item" onclick="selectShop(2,9)">🏠 暮らし・インテリア</div>
        <div class="dropdown-item" onclick="selectShop(2,10)">❤️ セルフケア・自分時間</div>
        <div class="dropdown-item" onclick="selectShop(2,11)">🌿 健康・サプリ・食生活</div>
        <div class="dropdown-item" onclick="selectShop(2,12)">✨ ダイエット・体型維持</div>
        <div class="dropdown-item" onclick="selectShop(2,13)">🤝 親の介護・準備</div>
      </div>
    </div>
  </div>

  <!-- ショップ情報 -->
  <div class="shop-info" id="shopInfo"></div>

  <!-- キャラクター選択 -->
  <div class="char-wrap">
    <label class="char-label">投稿キャラクター（SHOP別に固定）</label>
    <select class="char-select" id="charSelect" onchange="onCharChange()">
      <option value="">── キャラクターを選択 ──</option>
      <option value="sun">🌟 太陽ママ型　─　明るく感情豊か・ユーモアあり</option>
      <option value="sage">📚 知識派ママ型　─　論理的・情報重視・信頼感◎</option>
      <option value="solver">💪 解決師ママ型　─　実用的・ノウハウ重視・行動派</option>
      <option value="empath">🌸 共感妖精型　─　共感力◎・優しさ・感受性豊か</option>
      <option value="spark">⚡ 直感型ママ　─　即興力◎・熱量高い・勢い重視</option>
      <option value="planner">🎯 戦略家ママ型　─　計画的・分析好き・説得力◎</option>
      <option value="free">🌈 自由人ママ型　─　独自性◎・マイペース・個性的</option>
      <option value="community">🤝 仲間集めママ型　─　コミュニティ◎・対等関係</option>
    </select>
    <div class="char-desc" id="charDesc"></div>
  </div>

  <!-- 投稿モード -->
  <div class="mode-wrap">
    <label class="mode-label">投稿モード</label>
    <div class="mode-btns" id="modeBtns"></div>
    <div class="mode-info" id="modeInfo"></div>
  </div>

  <!-- APIキー -->
  <div class="api-wrap">
    <label class="api-label">🔑 OpenAI APIキー（必須）</label>
    <input class="api-input" type="text" id="apiKey" placeholder="sk-..." autocomplete="off">
    <div style="font-size:0.68rem;color:var(--muted);margin-top:5px;font-family:DM Mono,monospace;">※ platform.openai.com でAPIキーを取得してください</div>
  </div>

  <!-- 生成ボタン -->
  <div class="gen-wrap">
    <button class="gen-btn" id="genBtn" onclick="generate()">✨ 1週間分の投稿文を生成する</button>
  </div>

  <!-- 投稿一覧 -->
  <div class="days-wrap" id="daysWrap">
    <div class="empty">✍️<br>上のボタンを押すと<br>7日分の投稿文が自動生成されます</div>
  </div>
</div>

<!-- 商品管理画面 -->
<div class="screen" id="screen-products">
  <div class="prod-wrap">
    <div class="prod-header">
      <div class="prod-title">📦 商品データ管理</div>
      <span class="prod-back" onclick="showScreen('gen')">← 生成画面に戻る</span>
    </div>
    <div class="prod-shop-select">
      <select id="prodShopSel" onchange="renderProdList()"></select>
    </div>
    <div id="prodList"></div>
    <button class="prod-add-btn" onclick="openProdModal(null)">＋ 商品を追加する</button>
    <button class="prod-reset-btn" onclick="resetProds()">🔄 このSHOPをデフォルトに戻す</button>
  </div>
</div>

<!-- 商品編集モーダル -->
<div class="prod-modal-overlay" id="prodModal">
  <div class="prod-modal">
    <div class="prod-modal-title" id="prodModalTitle">商品を追加する</div>
    <input type="hidden" id="prodEditIdx" value="-1">
    <div class="prod-field"><label>商品名</label><input type="text" id="pName" placeholder="例：ホットクック"></div>
    <div class="prod-field"><label>メリット・どんな商品か</label><textarea id="pBenefit" placeholder="例：材料を入れてボタンを押すだけで完成"></textarea></div>
    <div class="prod-field"><label>使った後の変化（体験談として使用）</label><textarea id="pChange" placeholder="例：夕飯準備が15分に短縮された"></textarea></div>
    <div class="prod-field"><label>価格帯（参考）</label><input type="text" id="pPrice" placeholder="例：約4万円台"></div>
    <div class="prod-field"><label>報酬メモ（自分用）</label><input type="text" id="pRate" placeholder="例：料率8%・月1回以上売れる"></div>
    <div class="prod-modal-btns">
      <button class="prod-cancel-btn" onclick="closeProdModal()">キャンセル</button>
      <button class="prod-save-btn" onclick="saveProd()">保存する</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// データ定義
// ============================================================
const PERSONA_TYPES = {
  sun:    { icon:"🌟", name:"太陽ママ型",    desc:"明るく感情豊か。読者の心を温めるのが得意。", tone:"明るく元気いっぱい。語尾は「〜だよ！」「〜だった！」。感嘆符を効果的に使う。" },
  sage:   { icon:"📚", name:"知識派ママ型",  desc:"論理的で情報重視。信頼できる専門家として読者から頼られる存在。", tone:"丁寧で信頼感のある文体。根拠を示す表現を使う。" },
  solver: { icon:"💪", name:"解決師ママ型",  desc:"実用的でノウハウ重視。悩みをスパッと解決する頼れるお姉さん。", tone:"実践的で具体的。番号を使い整理された文体。行動を促す。" },
  empath: { icon:"🌸", name:"共感妖精型",    desc:"優しく寄り添う。「わかるよ」と言ってもらえる安全地帯のような存在。", tone:"柔らかく優しい文体。共感の言葉を多用。読者の気持ちに寄り添う。" },
  spark:  { icon:"⚡", name:"直感型ママ",    desc:"勢いと即興が武器。リアルタイムな感情がそのまま投稿になる。", tone:"勢いのある文体。思ったことをそのまま書く。感情が溢れる表現。" },
  planner:{ icon:"🎯", name:"戦略家ママ型",  desc:"計画的で分析好き。データや実績を使って説得力のある投稿を作る。", tone:"計画的で構成がしっかりした文体。数字や実績を効果的に使う。" },
  free:   { icon:"🌈", name:"自由人ママ型",  desc:"マイペースで個性的。他とは違う独自の切り口で読者を引きつける。", tone:"個性的でマイペースな文体。「私だけかな？」「変かもだけど」など。" },
  community:{ icon:"🤝", name:"仲間集めママ型", desc:"コミュニティ重視。読者と対等な関係を築く。", tone:"対等で親しみやすい文体。「一緒に〜しよう」「みんなはどう？」など問いかけを多用。" }
};

const SHOPS = {
  1: { name:"30代ママ × 時短・QOL爆上げ", icon:"👶", target:"1歳と3歳を育てる30代ママ", theme:"育児の時短・QOL向上・便利グッズ", keywords:["時短","ワンオペ","育児グッズ","便利","子育て"], color:"", accent:"#e8845a",
    products:[
      { name:"ホットクック（シャープ自動調理鍋）", benefit:"材料を入れてボタンを押すだけで本格的な料理が完成", change:"夕飯準備が15分に短縮され、子どもとの時間が増えた", price:"約4万円台", rate:"高単価" },
      { name:"食洗機（パナソニック卓上型）", benefit:"食器洗いを完全自動化。毎晩30分の作業がゼロになる", change:"お風呂の時間が増え、自分時間が生まれた", price:"約4〜6万円台", rate:"高単価" },
      { name:"オイシックスの食材宅配", benefit:"献立を考えなくていい。栄養バランスの取れたミールキットが届く", change:"買い物の手間がなくなり、平日の精神的余裕が全然違う", price:"週2〜3千円", rate:"リピート型" }

window.onload = function() {
  // APIキー復元
  var k = localStorage.getItem("openai_api_key");
  if (k) document.getElementById("apiKey").value = k;
  
  // ペルソナ復元
  tab1Persona = localStorage.getItem("persona_tab1") || "";
  tab2Persona = localStorage.getItem("persona_tab2") || "";
  
  // モード復元
  tab1Mode = localStorage.getItem("mode_tab1") || "affiliate";
  tab2Mode = localStorage.getItem("mode_tab2") || "launch7";
  
  // APIキー保存（input/change/blur 全イベント対応）
  var apiKeyEl = document.getElementById("apiKey");
  function saveApiKey() { var v = this.value; if (v) localStorage.setItem("openai_api_key", v); }
  apiKeyEl.addEventListener("input", saveApiKey);
  apiKeyEl.addEventListener("change", saveApiKey);
  apiKeyEl.addEventListener("blur", saveApiKey);
  
  // 画面を更新
  renderShopInfo();
  renderModeButtons();
  renderCharSelect();
  updateStatusBanner();
};

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById("screen-" + name).classList.add("active");
  window.scrollTo(0, 0);
  if (name === "products") initProdScreen();
}

// SHOPタブ
// ============================================================
function toggleDropdown(num) {
  var dd = document.getElementById("dropdown" + num);
  var arr = document.getElementById("arrow" + num);
  var other = document.getElementById("dropdown" + (num === 1 ? 2 : 1));
  var otherArr = document.getElementById("arrow" + (num === 1 ? 2 : 1));
  var isOpen = dd.classList.contains("open");
  other.classList.remove("open");
  otherArr.classList.remove("open");
  // ★ タブをクリックしたら即座にactivateShop（開閉に関わらず）
  activateShop(num, num === 1 ? tab1Shop : tab2Shop);
  if (isOpen) {
    dd.classList.remove("open");
    arr.classList.remove("open");
  } else {
    dd.classList.add("open");
    arr.classList.add("open");
  }
}

function selectShop(tabNum, shopId) {
  if (tabNum === 1) tab1Shop = shopId; else tab2Shop = shopId;
  var dd = document.getElementById("dropdown" + tabNum);
  dd.querySelectorAll(".dropdown-item").forEach(function(el) { el.classList.remove("active-item"); });
  event.target.classList.add("active-item");
  var s = SHOPS[shopId];
  var parts = s.name.split(" × ");
  document.getElementById("tab" + tabNum + "-label").innerHTML = parts[0] + "<br>" + (parts[1] || "");
  dd.classList.remove("open");
  document.getElementById("arrow" + tabNum).classList.remove("open");
  activateShop(tabNum, shopId);
}

function activateShop(tabNum, shopId) {
  activeTab = tabNum;
  currentShop = shopId;
  document.getElementById("tab1").className = "shop-tab" + (tabNum === 1 ? " active-1" : "");
  document.getElementById("tab2").className = "shop-tab" + (tabNum === 2 ? " active-2" : "");
  var s = SHOPS[shopId];
  var isShop2 = (s.color === "shop2");
  document.getElementById("genBtn").className = "gen-btn" + (isShop2 ? " shop2" : "");
  renderShopInfo();
  renderModeButtons();
  renderCharSelect();
  updateStatusBanner();
  document.getElementById("daysWrap").innerHTML = "<div class=\"empty\">✍️<br>上のボタンを押すと<br>7日分の投稿文が自動生成されます</div>";
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".shop-tab-wrap")) {
    document.querySelectorAll(".dropdown").forEach(function(d) { d.classList.remove("open"); });
    document.querySelectorAll(".tab-arrow").forEach(function(a) { a.classList.remove("open"); });
  }
});

function renderShopInfo() {
  var s = SHOPS[currentShop];
  var el = document.getElementById("shopInfo");
  el.innerHTML = "<div class=\"shop-badge\" style=\"background:" + s.accent + "22\">" + s.icon + "</div><div><div class=\"shop-name\" style=\"color:" + s.accent + "\">" + s.name + "</div><div class=\"shop-desc\">ターゲット：" + s.target + "<br>テーマ：" + s.theme + "</div></div>";
}

function renderCharSelect() {
  var persona = activeTab === 1 ? tab1Persona : tab2Persona;
  var sel = document.getElementById("charSelect");
  sel.value = persona || "";
  updateCharDesc(persona);
}

function onCharChange() {
  var sel = document.getElementById("charSelect");
  var val = sel.value;
  if (activeTab === 1) {
    tab1Persona = val;
    localStorage.setItem("persona_tab1", val);
  } else {
    tab2Persona = val;
    localStorage.setItem("persona_tab2", val);
  }
  updateCharDesc(val);
  updateStatusBanner();
}

function updateCharDesc(key) {
  var el = document.getElementById("charDesc");
  if (!key || !PERSONA_TYPES[key]) {
    el.textContent = "";
    return;
  }
  var p = PERSONA_TYPES[key];
  el.textContent = p.desc;
}

function getMode() {
  return activeTab === 1 ? tab1Mode : tab2Mode;
}

function setMode(m) {
  if (activeTab === 1) {
    tab1Mode = m;
    localStorage.setItem("mode_tab1", m);
  } else {
    tab2Mode = m;
    localStorage.setItem("mode_tab2", m);
  }
  renderModeButtons();
}

function renderModeButtons() {
  var mode = getMode();
  var btns = document.getElementById("modeBtns");
  var info = document.getElementById("modeInfo");
  
  if (activeTab === 1) {
    btns.innerHTML =
      "<button class=\"mode-btn " + (mode === "affiliate" ? "active" : "") + "\" onclick=\"setMode('affiliate')\">🎯 アフィリエイト特化</button>" +
      "<button class=\"mode-btn " + (mode === "normal" ? "active" : "") + "\" onclick=\"setMode('normal')\">✍️ 通常モード</button>";
  } else {
    btns.innerHTML =
      "<button class=\"mode-btn " + (mode === "launch7" ? "active" : "") + "\" onclick=\"setMode('launch7')\">🌱 立ち上げ7日</button>" +
      "<button class=\"mode-btn " + (mode === "launch14" ? "active" : "") + "\" onclick=\"setMode('launch14')\">🌿 立ち上げ14日</button>" +
      "<button class=\"mode-btn " + (mode === "affiliate" ? "active" : "") + "\" onclick=\"setMode('affiliate')\">🎯 アフィリエイト移行</button>";

  if (mode === "launch7" || mode === "launch14") {
    info.textContent = "Threadsアルゴリズムにジャンルを認識させる専門性投稿を" + (mode === "launch14" ? "14" : "7") + "日分生成。商品紹介・CTAは一切含まれません。";

    info.className = "mode-info";

    banner.style.background = "#eafff5";
    banner.style.border = "1px solid #a0e0b0";
    banner.style.color = "#2a8a4a";
    banner.textContent = "✅ 両SHOP診断済み｜SHOP01: " + p1.icon + p1.name + "　SHOP02: " + p2.icon + p2.name;
  } else if (p1 || p2) {
    banner.style.display = "block";
    banner.style.background = "#fff8ea";
    banner.style.border = "1px solid #ffd080";
    banner.style.color = "#a06000";
    banner.textContent = "⚠️ " + (p1 ? "SHOP01設定済み" : "SHOP01未設定") + "　" + (p2 ? "SHOP02設定済み" : "SHOP02未設定");
  } else {
    banner.style.display = "none";
  }
}

// ============================================================
// 商品データ
// ============================================================
function getProducts(shopId) {
  var saved = localStorage.getItem("products_" + shopId);
  if (saved) { try { return JSON.parse(saved); } catch(e) {} }
  return SHOPS[shopId] && SHOPS[shopId].products ? SHOPS[shopId].products.slice() : [];
}
function saveProducts(shopId, prods) {
  localStorage.setItem("products_" + shopId, JSON.stringify(prods));
}
function pickProduct(shopId) {
  var prods = getProducts(shopId);
  return prods.length ? prods[Math.floor(Math.random() * prods.length)] : null;
}

// ============================================================
// 投稿生成
// ============================================================
function getFormula() {
  var mode = getMode();
  if (mode === "launch7") return FORMULAS.LAUNCH7;
  if (mode === "launch14") return FORMULAS.LAUNCH14;
  if (mode === "normal") return FORMULAS.NORMAL;
  return FORMULAS.STEALTH7;
}

function buildPrompt(step, formula) {
  var s = SHOPS[currentShop];
  var personaKey = (activeTab === 1 ? tab1Persona : tab2Persona) || "sun";
  var p = PERSONA_TYPES[personaKey];
  
  var productPart = "";
  if (step.product && currentProduct) {
    productPart = "\n\n【紹介する商品（自然な体験談として溶け込ませること）】" +
      "\n商品名：" + currentProduct.name +
      "\nどんな商品か：" + currentProduct.benefit +
      "\n使った後の変化：" + currentProduct.change +
      "\n\n【商品の扱い方ルール】" +
      "\n・商品名は多くても1〜2回まで" +
      "\n・「楽天」「アフィリエイト」「PR」という言葉は絶対に使わない" +
      "\n・売り込みの雰囲気を一切出さない" +
      "\n・友人に話すような自然なシェアのトーンを維持";
    if (step.cta) {
      productPart += "\n・最後の1〜2行で「気になった人はプロフのリンクを見てみてね」程度の柔らかい誘導を入れる";
    } else {
      productPart += "\n・リンク誘導・CTAは入れない";
    }
  } else if (!step.product) {
    productPart = "\n\n【重要】この投稿では商品・サービスの紹介は一切しない。純粋に共感・気づき・体験談として読者の心に刺さる投稿を書く。";
  }
  
  return "あなたは" + s.target + "向けのThreadsアカウントの中の人です。以下の条件で投稿文を日本語で書いてください。\n\n" +
    "【投稿者のキャラクター】\n" +
    "タイプ：" + p.name + "\n" +
    "特徴：" + p.desc + "\n" +
    "文体スタイル：" + p.tone + "\n\n" +
    "【このステップの役割】\n" +
    "フォーミュラー：" + formula.name + "\n" +
    "ステップ：" + step.label + "\n" +
    "目的：" + step.desc +
    productPart + "\n\n" +
    "【投稿条件】\n" +
    "・ターゲット：" + s.target + "\n" +
    "・テーマ：" + s.theme + "\n" +
    "・キーワード：" + s.keywords.join("、") + "\n" +
    "・文字数：400〜600文字\n" +
    "・Threadsらしい温かく自然な語り口で\n" +
    "・ハッシュタグなし\n" +
    "・投稿文のみ出力（説明文不要）";
}

async function generate() {
  var apiKey = document.getElementById("apiKey").value.trim();
  if (!apiKey) { alert("APIキーを入力してください"); return; }
  
  var formula = getFormula();
  var mode = getMode();
  currentProduct = (mode === "affiliate") ? pickProduct(currentShop) : null;
  
  var btn = document.getElementById("genBtn");
  var wrap = document.getElementById("daysWrap");
  btn.classList.add("loading");
  btn.innerHTML = "<div class=\"spinner\"></div> 生成中...";
  wrap.innerHTML = "";
  
  // バナー
  var bannerEl = document.createElement("div");
  bannerEl.style.cssText = "margin-bottom:14px;padding:12px 14px;background:#fff0ea;border:1px solid #ffd5c0;border-radius:12px;font-size:0.8rem;font-weight:700;color:#e8845a;";
  bannerEl.textContent = "✨ " + formula.name + "（" + formula.steps.length + "投稿シリーズ）" + (currentProduct ? "　📦 " + currentProduct.name : "");
  wrap.appendChild(bannerEl);
  
  for (var i = 0; i < formula.steps.length; i++) {
    var step = formula.steps[i];
    var day = DAYS_JP[i] || (i + 1) + "日目";
    var card = document.createElement("div");
    card.className = "day-card";
    var bodyId = "body" + i;
    var copyId = "copy" + i;
    card.innerHTML =
      "<div class=\"day-header\">" +
        "<span class=\"day-label\">DAY " + (i+1) + " · " + day + "</span>" +
        "<span class=\"day-step\">" + step.label + "</span>" +
      "</div>" +
      "<div class=\"day-body\" id=\"" + bodyId + "\">生成中...</div>" +
      "<div class=\"day-footer\"><button class=\"copy-btn\" id=\"" + copyId + "\" onclick=\"copyPost('" + bodyId + "','" + copyId + "')\" disabled>コピー</button></div>";
    wrap.appendChild(card);
    
    (function(step, bodyId, copyId) {
      var prompt = buildPrompt(step, formula);
      fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
        body: JSON.stringify({ model: "gpt-4o-mini", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
      }).then(function(r) { return r.json(); })
        .then(function(data) {
          var text = data.choices && data.choices[0] ? data.choices[0].message.content : "エラーが発生しました";
          document.getElementById(bodyId).textContent = text;
          var cb = document.getElementById(copyId);
          cb.disabled = false;
          cb.dataset.text = text;
        }).catch(function() {
          document.getElementById(bodyId).textContent = "エラーが発生しました。もう一度お試しください。";
        });
    })(step, bodyId, copyId);
  }
  
  btn.classList.remove("loading");
  btn.innerHTML = "✨ 投稿シリーズを生成する";
}

function copyPost(bodyId, copyId) {
  var btn = document.getElementById(copyId);
  var text = btn.dataset.text || document.getElementById(bodyId).textContent;
  if (!text || text === "生成中...") return;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = "コピー済み ✓";
    btn.classList.add("copied");
    setTimeout(function() { btn.textContent = "コピー"; btn.classList.remove("copied"); }, 2000);
  });
}

// ============================================================
// 商品管理
// ============================================================
var prodModalShopId = 1;

function initProdScreen() {
  var sel = document.getElementById("prodShopSel");
  sel.innerHTML = "";
  Object.entries(SHOPS).forEach(function(entry) {
    var id = entry[0]; var s = entry[1];
    var opt = document.createElement("option");
    opt.value = id;
    opt.textContent = s.icon + " " + s.name;
    sel.appendChild(opt);
  });
  // ★ 現在アクティブなSHOPをデフォルト選択
  sel.value = currentShop;
  renderProdList();
}

function renderProdList() {
  var shopId = parseInt(document.getElementById("prodShopSel").value);
  var prods = getProducts(shopId);
  var list = document.getElementById("prodList");
  if (!prods.length) {
    list.innerHTML = "<div class=\"empty\" style=\"padding:20px\">📦<br>商品がまだありません</div>";
    return;
  }
  list.innerHTML = prods.map(function(p, i) {
    return "<div class=\"prod-card\">" +
      "<div class=\"prod-card-name\">📦 " + p.name + "</div>" +
      "<div class=\"prod-card-detail\">メリット：" + p.benefit + "<br>変化：" + p.change + (p.price ? "<br>価格帯：" + p.price : "") + "</div>" +
      "<div class=\"prod-card-actions\">" +
        "<button class=\"prod-edit-btn\" onclick=\"openProdModal(" + i + ")\">編集</button>" +
        "<button class=\"prod-del-btn\" onclick=\"deleteProd(" + i + ")\">削除</button>" +
      "</div></div>";
  }).join("");
}

function openProdModal(idx) {
  prodModalShopId = parseInt(document.getElementById("prodShopSel").value);
  document.getElementById("prodEditIdx").value = idx === null ? -1 : idx;
  document.getElementById("prodModalTitle").textContent = idx === null ? "商品を追加する" : "商品を編集する";
  if (idx !== null && idx >= 0) {
    var p = getProducts(prodModalShopId)[idx];
    document.getElementById("pName").value = p.name || "";
    document.getElementById("pBenefit").value = p.benefit || "";
    document.getElementById("pChange").value = p.change || "";
    document.getElementById("pPrice").value = p.price || "";
    document.getElementById("pRate").value = p.rate || "";
  } else {
    ["pName","pBenefit","pChange","pPrice","pRate"].forEach(function(id) { document.getElementById(id).value = ""; });
  }
  document.getElementById("prodModal").classList.add("open");
}

function closeProdModal() {
  document.getElementById("prodModal").classList.remove("open");
}

function saveProd() {
  var name = document.getElementById("pName").value.trim();
  var benefit = document.getElementById("pBenefit").value.trim();
  var change = document.getElementById("pChange").value.trim();
  if (!name || !benefit || !change) { alert("商品名・メリット・変化は必須です"); return; }
  var prod = { name:name, benefit:benefit, change:change, price:document.getElementById("pPrice").value.trim(), rate:document.getElementById("pRate").value.trim() };
  var prods = getProducts(prodModalShopId);
  var idx = parseInt(document.getElementById("prodEditIdx").value);
  if (idx >= 0) prods[idx] = prod; else prods.push(prod);
  saveProducts(prodModalShopId, prods);
  closeProdModal();
  renderProdList();
}

function deleteProd(idx) {
  if (!confirm("この商品を削除しますか？")) return;
  var shopId = parseInt(document.getElementById("prodShopSel").value);
  var prods = getProducts(shopId);
  prods.splice(idx, 1);
  saveProducts(shopId, prods);
  renderProdList();
}

function resetProds() {
  var shopId = parseInt(document.getElementById("prodShopSel").value);
  if (!confirm("このSHOPの商品をデフォルトに戻しますか？")) return;
  localStorage.removeItem("products_" + shopId);
  renderProdList();
}

document.addEventListener("click", function(e) {
  if (e.target.id === "prodModal") closeProdModal();
});
</script>
